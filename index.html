<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PROJECT ENERGY</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Calm Minimal</p>
        <h1>PROJECT ENERGY</h1>
        <p class="subtitle">Перезапуск энергии за 7 дней</p>
      </section>

      <section class="cards" aria-label="Основные блоки">
        <article class="card">
          <h2>Питание</h2>
          <p>Простые шаги, чтобы стабилизировать энергию и убрать перегрузки.</p>
        </article>
        <article class="card">
          <h2>Среда</h2>
          <p>Настройка пространства для фокуса, спокойствия и устойчивого ритма.</p>
        </article>
        <article class="card">
          <h2>Восстановление</h2>
          <p>Режим сна, паузы и ритуалы, которые возвращают ресурс каждый день.</p>
        </article>
      </section>

      <section class="cta-wrap">
        <button class="cta" type="button">Начать 7-дневный цикл</button>
      </section>
    </main>
  </body>
</html>
